services:
  - type: web
    name: driver-safety-backend
    env: python
    branch: main
    path: .
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    plan: free
  - type: static
    name: driver-safety-frontend
    branch: main
    path: frontend
    env: static
    buildCommand: npm ci && npm run build
    publishPath: dist
    plan: free
